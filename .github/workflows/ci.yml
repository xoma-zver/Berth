name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      # Библиотечные проекты, тесты и десктопный демо-хост; Browser и мобильные хосты демо
      # сознательно вне CI (нужны workloads)
      # Форматирование по .editorconfig; тот же scope, что и сборка (без Browser/мобильных)
      - name: Format check
        run: |
          for p in \
            src/Berth.Core src/Berth.Avalonia \
            samples/Berth.Demo samples/Berth.Demo.Desktop \
            tests/Berth.Core.Tests tests/Berth.Avalonia.Tests tests/Berth.Demo.Tests; do
            echo "::group::dotnet format $p"
            dotnet format "$p" --verify-no-changes
            echo "::endgroup::"
          done
      - name: Core tests
        run: dotnet test tests/Berth.Core.Tests -c Release
      - name: Avalonia headless tests
        run: dotnet test tests/Berth.Avalonia.Tests -c Release
      - name: Mini-IDE integration tests
        run: dotnet test tests/Berth.Demo.Tests -c Release
      - name: Demo build (walking skeleton)
        run: dotnet build samples/Berth.Demo.Desktop -c Release
      # Упаковка библиотек (задача 7.2); ContinuousIntegrationBuild включается в CI автоматически
      # (GITHUB_ACTIONS). Пуш на nuget.org — ручной шаг владельца с API-ключом.
      - name: Pack libraries
        run: |
          dotnet pack src/Berth.Core/Berth.Core.csproj -c Release -o artifacts
          dotnet pack src/Berth.Avalonia/Berth.Avalonia.csproj -c Release -o artifacts
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
