name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      # Библиотечные проекты и тесты; мобильные хосты демо сознательно вне CI (нужны workloads)
      - name: Core tests
        run: dotnet test tests/IdeaDocking.Core.Tests -c Release
      - name: Avalonia headless tests
        run: dotnet test tests/IdeaDocking.Avalonia.Tests -c Release
